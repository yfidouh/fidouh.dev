# Git hooks (installed via `bunx lefthook install`, runs automatically after `bun install` at root).
# PATH for GUI git clients is fixed in .lefthookrc, which the hook script sources by convention.
pre-commit:
  commands:
    prettier:
      root: "apps/yahya/"
      glob: "*.{js,mjs,ts,tsx,astro,css,md,mdx,json,yml,yaml}"
      run: bunx prettier --write {staged_files}
      stage_fixed: true
